<div class="w-100 d-flex align-items-center justify-content-center h-100">
  <div class="w-100" style="max-width: 420px">
    <div class="text-center mb-4">
      <h1 class="fw-bold mb-1">Welcome Back</h1>
      <p class="mb-0 text-muted">
        Don’t have an account yet?
        <a [routerLink]="['/auth/register']" class="text-primary">Register here</a>
      </p>
    </div>

    <div class="card shadow-sm">
      <div
        class="card-body p-4 d-flex flex-column justify-content-center"
        style="min-height: 420px"
      >
        <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="w-100">
          <div class="mb-3">
            <label class="form-label">
              Email <span class="text-danger">*</span>
            </label>
            <input
              type="email"
              class="form-control"
              name="email"
              [(ngModel)]="email"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>

            <input
              type="password"
              class="form-control"
              name="password"
              [(ngModel)]="password"
              required
            />
          </div>

          <div class="mb-4 d-flex justify-content-between align-items-center">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="rememberMe" />
              <label class="form-check-label" for="rememberMe">
                Remember me
              </label>
            </div>

            <a href="#" class="text-primary small"> Forgot Password </a>
          </div>

          <div class="d-grid">
            <button class="btn btn-success" type="submit">Sign In</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
