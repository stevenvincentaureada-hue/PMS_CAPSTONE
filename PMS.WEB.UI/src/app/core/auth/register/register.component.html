<div class="w-100 d-flex align-items-center justify-content-center h-100">
  <div class="w-100" style="max-width: 620px">
    <div class="text-center mb-4">
      <h1 class="fw-bold mb-1">Register</h1>
      <p class="mb-0 text-muted">
        Already have an account?
        <a [routerLink]="['/auth/login']" class="text-primary">Login here</a>
      </p>
    </div>

    <div class="card shadow-sm">
      <div
        class="card-body p-4 d-flex flex-column justify-content-center"
        style="min-height: 420px"
      >
        <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="w-100">
          <div class="row mb-3">
            <div class="col">
              <label class="form-label"
                >First Name <span class="text-danger">*</span></label
              >
              <input
                type="text"
                class="form-control"
                name="first_name"
                [(ngModel)]="first_name"
                required
              />
            </div>
            <div class="col">
              <label class="form-label">Middle Name</label>
              <input
                type="text"
                class="form-control"
                name="middle_name"
                [(ngModel)]="middle_name"
              />
            </div>
            <div class="col">
              <label class="form-label"
                >Last Name <span class="text-danger">*</span></label
              >
              <input
                type="text"
                class="form-control"
                name="last_name"
                [(ngModel)]="last_name"
                required
              />
            </div>
          </div>
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label">License Number</label>
                <input
                  type="text"
                  class="form-control"
                  name="license_number"
                  [(ngModel)]="license_number"
                />
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input
                  type="text"
                  class="form-control"
                  name="phone_number"
                  [(ngModel)]="phone_number"
                />
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Address</label>
            <textarea
              class="form-control"
              name="address"
              [(ngModel)]="address"
              rows="2"
            ></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">
              Email <span class="text-danger">*</span>
            </label>
            <input
              type="email"
              class="form-control"
              name="email"
              [(ngModel)]="email"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>

            <input
              type="password"
              class="form-control"
              name="password"
              [(ngModel)]="password"
              required
            />
          </div>

          <div class="mb-4 d-flex justify-content-between align-items-center">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="rememberMe" />
              <label class="form-check-label" for="rememberMe">
                Remember me
              </label>
            </div>
          </div>

          <div class="d-grid">
            <button class="btn btn-success" type="submit">Sign Up</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
